<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waypoint</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/waypoint-icon-large.png">
</head>
<body>
  <div id="backgroundLayer" class="background-layer"></div>
  <div id="backgroundOverlay" class="background-overlay"></div>

  <main class="page-shell">
    <header class="toolbar">
      <button id="logoBtn" class="logo-mark" type="button" aria-label="Open command center" title="Command center">
        <span class="logo-glyph">~/_</span><span id="logoPrompt" class="logo-prompt">user@waypoint:~$</span>
      </button>
      <div class="brand-wordmark" aria-hidden="true">Waypoint</div>

      <div class="toolbar-right">
        <button id="clock" class="mini-clock" type="button" title="Focus search" aria-label="Current date and time"></button>
        <button id="weatherWidget" class="weather-widget" type="button" title="Weather settings" aria-label="Weather">
          <span class="weather-icon">--</span>
          <span class="weather-main">Set weather</span>
          <span class="weather-place">location</span>
        </button>
      </div>
      <input type="file" id="importFile" accept="application/json,.json" hidden>
    </header>

    <section class="hero">
      <form id="searchForm" action="https://www.google.com/search" method="GET" class="search" autocomplete="off">
        <span id="searchEngineBadge" class="search-engine-badge" aria-hidden="true">G</span>
        <input id="searchInput" name="q" placeholder="Search Google" autofocus>
        <button type="submit" aria-label="Search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.75 4a6.75 6.75 0 0 1 5.34 10.88l3.52 3.51a.86.86 0 0 1-1.22 1.22l-3.51-3.52A6.75 6.75 0 1 1 10.75 4Zm0 1.72a5.03 5.03 0 1 0 0 10.06 5.03 5.03 0 0 0 0-10.06Z"/></svg>
        </button>
      </form>

      <div id="heroImageCard" class="hero-image-card">
        <img id="heroImage" src="img/nord-atmo.png" alt="Decorative Linux banner">
      </div>
    </section>

    <section id="sections" class="sections" aria-label="Link sections"></section>
  </main>

  <div class="modal hidden" id="linkModal" role="dialog" aria-modal="true" aria-labelledby="linkModalTitle">
    <div class="modal-content compact-modal">
      <button class="modal-close" data-close-modal="linkModal" aria-label="Close">×</button>
      <h3 id="linkModalTitle">Add Link</h3>
      <label>Name<input id="linkName" placeholder="GitHub"></label>
      <label>URL<input id="linkUrl" placeholder="https://github.com"></label>
      <div class="icon-picker-row">
        <div class="icon-preview-wrap" aria-hidden="true">
          <img id="linkIconPreview" class="link-icon-preview empty" alt="">
        </div>
        <label class="upload-btn icon-upload-btn">Upload Icon
          <input type="file" id="linkIconInput" accept="image/*" hidden>
        </label>
        <button id="clearLinkIconBtn" class="ghost-btn" type="button">Clear Icon</button>
      </div>
      <div class="modal-actions">
        <button id="saveLinkBtn" class="primary-btn">Save</button>
        <button class="ghost-btn" data-close-modal="linkModal" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="terminalModal" role="dialog" aria-modal="true" aria-labelledby="terminalModalTitle">
    <div class="terminal-window" role="document">
      <div class="terminal-titlebar">
        <div class="terminal-buttons" aria-hidden="false">
          <button class="term-dot term-close" data-close-modal="terminalModal" type="button" aria-label="Close terminal"></button>
          <button class="term-dot term-min" type="button" aria-label="Decorative minimize button" tabindex="-1"></button>
          <button class="term-dot term-max" type="button" aria-label="Decorative maximize button" tabindex="-1"></button>
        </div>
        <strong id="terminalModalTitle">waypoint terminal</strong>
      </div>
      <div class="terminal-screen">
        <div id="commandOutput" class="command-output" aria-live="polite"></div>
        <div class="terminal-command-line">
          <span id="commandPromptLabel">user@startpage:~$</span>
          <input id="commandInput" spellcheck="false" autocomplete="off" placeholder="type help, fetch, theme nord, banner desktop">
        </div>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
    <div class="modal-content settings-modal settings-v11">
      <button class="modal-close" data-close-modal="settingsModal" aria-label="Close settings">×</button>
      <h3 id="settingsModalTitle">Settings</h3>

      <div class="settings-tabs" role="tablist" aria-label="Waypoint settings pages">
        <button class="settings-tab active" type="button" data-settings-page="appearance">Appearance</button>
        <button class="settings-tab" type="button" data-settings-page="layout">Workspace</button>
        <button class="settings-tab" type="button" data-settings-page="bookmarks">Bookmarks</button>
        <button class="settings-tab" type="button" data-settings-page="weather">Weather</button>
        <button class="settings-tab" type="button" data-settings-page="banner">Banner</button>
        <button class="settings-tab" type="button" data-settings-page="textcolors">Text Colors</button>
        <button class="settings-tab" type="button" data-settings-page="advanced">Advanced</button>
        <button class="settings-tab" type="button" data-settings-page="backup">Backup</button>
      </div>

      <div class="settings-page active" data-page="appearance">
        <div class="terminal-control-grid">
          <label>Your Name<input id="userNameInput" placeholder="user" maxlength="32"></label>
          <label>Theme<select id="themeSelect"><option value="catppuccin">Catppuccin</option><option value="nord">Nord</option><option value="gruvbox">Gruvbox</option><option value="tokyoNight">Tokyo Night</option></select></label>
          <label>Interface Font<select id="fontSelect"><option value="inter">Waypoint</option><option value="system">System</option></select></label>
          <label>UI Scale <span id="uiScaleValue"></span><input type="range" id="uiScaleSlider" min="85" max="120" value="100"></label>
          <label class="color-control">Accent Color<input id="accentColorInput" type="color"></label>
          <label class="color-control">Surface Color<input id="panelColorInput" type="color"></label>
          <label>Use Custom Colors<select id="customColorsSelect"><option value="false">Theme Colors</option><option value="true">Custom Colors</option></select></label>
          <label>Window Transparency <span id="windowTransparencyValue"></span><input type="range" id="windowTransparencySlider" min="60" max="100" value="92"></label>
        </div>
        <div class="button-row settings-uploads"><button id="resetAppearanceBtn" class="ghost-btn" type="button">Reset Appearance</button></div>
      </div>

      <div class="settings-page" data-page="layout">
        <div class="workspace-summary-card">
          <span>Current Workspace</span>
          <strong id="workspaceTemplateStatus">Classic</strong>
          <p id="workspaceTemplateDescription">Balanced default Waypoint layout.</p>
        </div>
        <div class="terminal-control-grid">
          <label>Starting Template<select id="workspaceTemplateSelect"><option value="classic">Classic</option><option value="dashboard">Dashboard</option><option value="minimal">Minimal</option></select></label>
          <label>Hero Style<select id="workspaceHeroStyleSelect"><option value="standard">Standard Hero</option><option value="topBar">Top Bar</option><option value="bottomBar">Bottom Bar</option></select></label>
          <label>Show Logo / Terminal Button<select id="showLogoSelect"><option value="true">Show</option><option value="false">Hide</option></select></label>
          <label>Show Waypoint Name<select id="showWordmarkSelect"><option value="true">Show</option><option value="false">Hide</option></select></label>
          <label>Show Clock<select id="showClockSelect"><option value="true">Show</option><option value="false">Hide</option></select></label>
          <label>Show Weather<select id="showWeatherSelect"><option value="true">Show</option><option value="false">Hide</option></select></label>
          <label>Show Search<select id="showSearchSelect"><option value="true">Show</option><option value="false">Hide</option></select></label>
          <label>Show Section Titles<select id="showSectionTitlesSelect"><option value="true">Show</option><option value="false">Hide</option></select></label>
          <label>Shortcut<select id="shortcutSelect"><option value="none">Disabled</option><option value="altT">Alt+T</option><option value="ctrlShiftSpace">Ctrl+Shift+Space</option></select></label>
        </div>
        <div class="button-row settings-uploads">
          <button id="applyWorkspaceTemplateBtn" class="ghost-btn" type="button">Use Selected Template</button>
          <button id="editLayoutBtn" class="primary-btn" type="button">Customize Workspace</button>
          <button id="resetLayoutBtn" class="ghost-btn" type="button">Reset Workspace</button>
        </div>
      </div>

      <div class="settings-page" data-page="bookmarks">
        <div class="terminal-control-grid">
          <label>Bookmark Layout<select id="bookmarkLayoutSelect"><option value="list">Compact List</option><option value="grid">Grid Cards</option></select></label>
          <label>Bookmark Columns<select id="bookmarkColumnsSelect"><option value="auto">Auto</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select></label>
          <label>Bookmark Font Size <span id="bookmarkFontValue"></span><input type="range" id="bookmarkFontSlider" min="10" max="15" value="12"></label>
          <label>Icon Size <span id="bookmarkIconValue"></span><input type="range" id="bookmarkIconSlider" min="14" max="36" value="22"></label>
        </div>
        <div class="button-row settings-uploads"><button id="resetBookmarksBtn" class="ghost-btn" type="button">Reset Bookmarks Settings</button></div>
      </div>

      <div class="settings-page" data-page="weather">
        <div class="terminal-control-grid">
          <label>Weather Location<input id="weatherLocationInput" placeholder="City, Region, Country or ZIP" maxlength="80"></label>
          <label>Weather Unit<select id="weatherUnitSelect"><option value="auto">Auto</option><option value="fahrenheit">Fahrenheit</option><option value="celsius">Celsius</option></select></label>
        </div>
        <div class="button-row settings-uploads"><button id="resetWeatherBtn" class="ghost-btn" type="button">Reset Weather</button></div>
      </div>

      <div class="settings-page" data-page="banner">
        <p id="bannerWorkspaceNotice" class="settings-context-note" hidden></p>
        <div class="terminal-control-grid">
          <label>Wallpaper<select id="backgroundModeSelect"><option value="wallpaper">Theme Wallpaper</option><option value="gradient">Theme Gradient</option><option value="custom">Custom Upload</option></select></label>
          <label>Banner Style<select id="heroStyleSelect"><option value="auto">Theme Default</option><option value="desktop">Desktop</option><option value="atmo">Atmosphere</option><option value="custom">Custom Upload</option><option value="hidden">Hidden</option></select></label>
          <label>Overlay <span id="overlayValue"></span><input type="range" id="overlaySlider" min="0" max="70" value="35"></label>
          <label>Blur <span id="blurValue"></span><input type="range" id="blurSlider" min="0" max="20" value="0"></label>
          <label>Banner Size<select id="heroHeightPresetSelect"><option value="hidden">Hidden</option><option value="small">Small</option><option value="medium">Medium</option><option value="large">Large</option></select></label>
        </div>
        <div class="button-row settings-uploads">
          <label class="upload-btn">Upload Wallpaper<input type="file" id="backgroundUpload" accept="image/*" hidden></label>
          <label class="upload-btn">Upload Banner<input type="file" id="imageUpload" accept="image/*" hidden></label>
          <button id="resetBackgroundBtn" class="ghost-btn" type="button">Reset Wallpaper</button>
          <button id="resetHeroBtn" class="ghost-btn" type="button">Use Theme Banner</button>
          <button id="resetBannerBtn" class="ghost-btn" type="button">Reset Banner</button>
        </div>
      </div>

      <div class="settings-page" data-page="textcolors">
        <div class="terminal-control-grid color-grid">
          <label>Use Text Colors<select id="customTextColorsSelect"><option value="false">Theme Text</option><option value="true">Custom Text</option></select></label>
          <label class="color-control">Global Text<input id="globalTextColorInput" type="color"></label>
          <label class="color-control custom-text-only">Section Titles<input id="sectionTitleColorInput" type="color"></label>
          <label class="color-control custom-text-only">Bookmark Text<input id="bookmarkTextColorInput" type="color"></label>
          <label class="color-control custom-text-only">Muted Text<input id="mutedTextColorInput" type="color"></label>
          <label class="color-control custom-text-only">Terminal Prompt<input id="terminalTextColorInput" type="color"></label>
          <label class="color-control custom-text-only">Clock / Weather<input id="statusTextColorInput" type="color"></label>
        </div>
        <div class="button-row settings-uploads"><button id="resetTextBtn" class="ghost-btn" type="button">Reset Text Colors</button></div>
      </div>

      <div class="settings-page" data-page="advanced">
        <div class="terminal-control-grid">
          <label>Search Engine<select id="searchEngineSelect"><option value="google">Google</option><option value="duckduckgo">DuckDuckGo</option><option value="brave">Brave</option><option value="bing">Bing</option><option value="custom">Custom</option></select></label>
          <label>Custom Search URL<input id="customSearchInput" placeholder="https://example.com/search?q=%s"></label>
          <label>Terminal Transparency <span id="terminalTransparencyValue"></span><input type="range" id="terminalTransparencySlider" min="60" max="100" value="94"></label>
        </div>
        <label class="custom-css-label">Custom CSS<textarea id="customCssInput" spellcheck="false" placeholder=".brand-wordmark { display: none; }"></textarea></label>
        <div class="button-row settings-uploads">
          <button id="cssManBtn" class="ghost-btn" type="button">Open CSS Help</button>
          <button id="clearCustomCssBtn" class="ghost-btn" type="button">Clear Custom CSS</button>
          <button id="resetAdvancedBtn" class="ghost-btn" type="button">Reset Advanced</button>
        </div>
      </div>

      <div class="settings-page" data-page="backup">
        <div class="button-row settings-uploads">
          <button id="exportBtn" class="ghost-btn" type="button">Export Complete Backup</button>
          <button id="exportWorkspaceBtn" class="ghost-btn" type="button">Export Workspace</button>
          <button id="exportBookmarksBtn" class="ghost-btn" type="button">Export Bookmarks</button>
          <button id="exportSettingsBtn" class="ghost-btn" type="button">Export Settings</button>
          <button id="importBtn" class="ghost-btn" type="button">Import JSON</button>
          <button id="resetEverythingBtn" class="ghost-btn" type="button">Factory Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
